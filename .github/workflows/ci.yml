name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          sw_vers -productVersion
          xcode-select -p
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
